<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стать партнёром — Balur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3ece6;
    --card:#fbf7f3;
    --ink:#3a2f2a;
    --muted:#9a8a7e;
    --accent:#a9745b;
    --line:#e6dcd2;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Jost',sans-serif;
    background:
      radial-gradient(ellipse at 20% 0%, #efe2d8 0%, transparent 55%),
      radial-gradient(ellipse at 100% 100%, #ecdfd6 0%, transparent 50%),
      var(--bg);
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:22px;
    max-width:440px;width:100%;
    padding:48px 40px;
    text-align:center;
    box-shadow:0 30px 60px -30px rgba(58,47,42,.25);
    animation:rise .7s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .mark{
    font-family:'Cormorant Garamond',serif;
    letter-spacing:.42em;
    text-transform:uppercase;
    font-size:.8rem;
    color:var(--accent);
    margin-bottom:28px;
  }
  h1{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-size:2rem;
    line-height:1.2;
    margin-bottom:14px;
  }
  p{
    color:var(--muted);
    font-weight:300;
    line-height:1.65;
    font-size:.98rem;
    margin-bottom:30px;
  }
  .spinner{
    width:26px;height:26px;margin:0 auto 26px;
    border:2px solid var(--line);
    border-top-color:var(--accent);
    border-radius:50%;
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .btn{
    display:inline-block;
    background:var(--accent);
    color:#fff;
    text-decoration:none;
    padding:15px 34px;
    border-radius:100px;
    font-weight:400;
    letter-spacing:.04em;
    font-size:.95rem;
    transition:transform .2s ease, box-shadow .2s ease;
    box-shadow:0 12px 24px -12px var(--accent);
  }
  .btn:hover{transform:translateY(-2px);box-shadow:0 18px 30px -14px var(--accent)}
  .mailline{
    margin-top:22px;
    font-size:.86rem;
    color:var(--muted);
  }
  .mailline a{color:var(--accent);text-decoration:none}
  .mailline a:hover{text-decoration:underline}
</style>
</head>
<body>
  <main class="card">
    <div class="mark">Balur</div>
    <div class="spinner" id="spinner"></div>
    <h1>Открываем письмо…</h1>
    <p>Сейчас откроется ваш почтовый клиент с готовым шаблоном заявки. Если этого не произошло — нажмите кнопку ниже.</p>
    <a class="btn" id="mailBtn" href="#">Написать нам</a>
    <div class="mailline">или вручную: <a id="mailText" href="#">b2b@balur.beauty</a></div>
  </main>

<script>
  (function(){
    var email = "b2b@balur.beauty";
    var body = [
      "Имя / Название компании: ",
      "Контактное лицо: ",
      "Телефон: ",
      "Email: ",
      "Регион / География работы: ",
      "Комментарий / описание деятельности: "
    ].join("\n");

    var mailto = "mailto:" + email + "?body=" + encodeURIComponent(body);

    document.getElementById("mailBtn").setAttribute("href", mailto);
    document.getElementById("mailText").setAttribute("href", mailto);

    // даём странице отрисоваться, затем уводим на mailto
    setTimeout(function(){ window.location.href = mailto; }, 350);
  })();
</script>
</body>
</html>
