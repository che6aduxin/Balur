<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стать партнёром — BALUR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:'Raleway',sans-serif;
    background:#ffffff;
    color:#2a2118;
    display:flex;
    flex-direction:column;
    min-height:100vh;
  }

  /* HEADER — точно как на сайте */
  header{
    border-bottom:1px solid #e8e0d8;
    padding:0 40px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .logo{
    font-family:'Playfair Display',serif;
    font-size:1.6rem;
    letter-spacing:.25em;
    text-transform:uppercase;
    color:#2a2118;
    text-decoration:none;
    position:relative;
  }
  /* надчёркивание у буквы U как в логотипе BALŪR */
  .logo .u{text-decoration:overline;text-decoration-color:#2a2118;}

  /* MAIN */
  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 24px;
  }
  .wrap{
    max-width:480px;
    width:100%;
    text-align:center;
  }

  .eyebrow{
    font-size:.72rem;
    letter-spacing:.3em;
    text-transform:uppercase;
    color:#9a8a7e;
    margin-bottom:24px;
    font-weight:400;
  }

  h1{
    font-family:'Playfair Display',serif;
    font-size:2.2rem;
    font-weight:400;
    line-height:1.25;
    color:#2a2118;
    margin-bottom:16px;
  }

  .divider{
    width:40px;height:1px;
    background:#c8b8a8;
    margin:22px auto;
  }

  p{
    color:#7a6e66;
    font-weight:300;
    font-size:.95rem;
    line-height:1.75;
    margin-bottom:36px;
  }

  .spinner{
    width:22px;height:22px;
    margin:0 auto 28px;
    border:1.5px solid #e8e0d8;
    border-top-color:#2a2118;
    border-radius:50%;
    animation:spin 1s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .btn{
    display:inline-block;
    background:#2a2118;
    color:#fff;
    text-decoration:none;
    padding:16px 44px;
    font-family:'Raleway',sans-serif;
    font-weight:500;
    font-size:.85rem;
    letter-spacing:.12em;
    text-transform:uppercase;
    transition:background .2s ease, transform .2s ease;
    border-radius:0;
  }
  .btn:hover{background:#3e3026;transform:translateY(-1px)}

  .mailline{
    margin-top:24px;
    font-size:.83rem;
    color:#9a8a7e;
    font-weight:300;
  }
  .mailline a{
    color:#2a2118;
    text-decoration:none;
    border-bottom:1px solid #c8b8a8;
    padding-bottom:1px;
  }
  .mailline a:hover{border-bottom-color:#2a2118}

  /* FOOTER */
  footer{
    border-top:1px solid #e8e0d8;
    text-align:center;
    padding:20px;
    font-size:.75rem;
    letter-spacing:.08em;
    color:#bbb0a6;
    text-transform:uppercase;
  }

  @media(max-width:480px){
    header{padding:0 20px}
    h1{font-size:1.7rem}
    .btn{padding:14px 32px}
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="https://balur.beauty">BAL<span class="u">U</span>R</a>
</header>

<main>
  <div class="wrap">
    <div class="eyebrow">Партнёрство</div>
    <div class="spinner" id="spinner"></div>
    <h1>Стать дистрибьютором</h1>
    <div class="divider"></div>
    <p>Сейчас откроется ваш почтовый клиент с готовым шаблоном заявки.<br>Если этого не произошло — нажмите кнопку ниже.</p>
    <a class="btn" id="mailBtn" href="#">Написать нам</a>
    <div class="mailline" style="margin-top:20px">или напишите напрямую: <a id="mailText" href="#">b2b@balur.beauty</a></div>
  </div>
</main>

<footer>© BALUR Beauty</footer>

<script>
  (function(){
    var email = "b2b@balur.beauty";
    var body = [
        "Имя: ",
        "Компания / название магазина: ",
        "Страна и город: ",
        "Телефон: ",
        "Email: ",
        "Формат сотрудничества (дропшиппинг, опт, розница): "
    ].join("\n");

    var mailto = "mailto:" + email + "?body=" + encodeURIComponent(body);

    document.getElementById("mailBtn").setAttribute("href", mailto);
    document.getElementById("mailText").setAttribute("href", mailto);
    document.getElementById("spinner").style.display = "block";

    setTimeout(function(){
      window.location.href = mailto;
    }, 350);
  })();
</script>
</body>
</html>
